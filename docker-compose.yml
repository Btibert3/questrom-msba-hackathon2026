services:
  prefect-server:
    build: .
    command: prefect server start --host 0.0.0.0
    ports:
      - "4201:4200"
    environment:
      - PREFECT_UI_API_URL=http://127.0.0.1:4200/api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  prefect-worker:
    build: .
    command: >
      sh -c "
        prefect config set PREFECT_API_URL=http://prefect-server:4200/api &&
        prefect worker start --pool default-process-pool --type process
      "
    depends_on:
      prefect-server:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - ./workflows:/app/workflows

  streamlit:
    build: .
    command: streamlit run /app/app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8502:8501"
    env_file:
      - path: .env
        required: false
    volumes:
      - ./app:/app/app
